name: Build and publish dev image
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: dev-env
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix (no-daemon)
        run: |
          curl -L https://nixos.org/nix/install | sh -s -- --no-daemon
          . /home/runner/.nix-profile/etc/profile.d/nix.sh
      - name: Ensure flakes enabled
        run: |
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" >> ~/.config/nix/nix.conf
      - name: Build dev image with nix
        run: |
          nix --extra-experimental-features 'nix-command flakes' build .#devContainer
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Load image and push to Docker Hub
        run: |
          docker load < result
          docker tag dev-env:latest ${{ secrets.DOCKERHUB_USERNAME }}/dev-env:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dev-env:latest
