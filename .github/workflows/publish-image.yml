name: Build and publish dev image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: dev-env

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build dev image with nix
        run: |
          nix build .#devContainer

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Load image and push to Docker Hub
        run: |
          docker load < result
          docker tag dev-env:latest ${{ secrets.DOCKERHUB_USERNAME }}/dev-env:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dev-env:latest